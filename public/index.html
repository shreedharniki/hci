<!doctype html>
<html>
  <head>
    <title>Chief Estimator Dashboard</title>

    <link rel="stylesheet" href="css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <!-- ================= MENU ================= -->

    <div class="menubar">
      <div>File</div>
      <div>Edit</div>
      <div>Utilities</div>
      <div>Libraries</div>
      <div>Project</div>
      <div>Estimate</div>
      <div>Resources</div>
      <div>Reports</div>
      <div>Preferences</div>
      <div>Help</div>
    </div>

    <!-- ================= TOOLBAR ================= -->

    <div class="toolbar">
      <button id="expandAll">
        <i class="fa-solid fa-square-plus"></i>
      </button>

      <button id="collapseAll">
        <i class="fa-solid fa-square-minus"></i>
      </button>

      <input id="searchTree" placeholder="Search Cost Breakdown..." />

      <label class="upload">
        <i class="fa-solid fa-upload"></i>

        Upload MDB

        <input type="file" id="estimateFile" hidden accept=".mdb" />
      </label>
    </div>

    <!-- ================= WORK AREA ================= -->

    <div class="workspace">
      <!-- LEFT TREE -->

      <div class="left">
        <div class="panel-title">Cost Breakdown</div>

        <div id="tree"></div>
      </div>

      <!-- RIGHT SIDE -->

      <div class="right">
        <div class="tabs">
          <button id="detailTab" class="active">Detail</button>

          

            <button id="laborRateTab">Labor Rate</button>
            <button id="materialRateTab">Material Rate</button>
            <button id="equipmentRateTab">Equipment Rate</button>
          

        </div>

        <!-- DETAIL -->

        <div id="detailView">
          <h3>Cost Detail Information</h3>

          <div class="form-grid">
            <label> Line No </label>

            <input id="lineNo" readonly />

            <label> Description </label>

            <input id="description" readonly />

            <label> Quantity </label>

            <input id="quantity" readonly />

            <label> Unit </label>

            <input id="unit" readonly />

            <label> Status </label>

            <input id="status" value="Bid" readonly />
          </div>
        </div>
<div id="laborRateView" style="display:none">
    <table id="laborRateTable"></table>
</div>

<div id="materialRateView" style="display:none">
    <table id="materialRateTable"></table>
</div>

<div id="equipmentRateView" style="display:none">
    <table id="equipmentRateTable"></table>
</div>
        <!-- BID LIST -->
<h3>Bid Lines</h3>
<table id="bidTable">
    <thead></thead>
    <tbody></tbody>
</table>


<h3>Resources</h3>
<table id="resourceTable">
    <thead></thead>
    <tbody></tbody>
</table>


<h3>Crew</h3>
<table id="crewTable">
    <thead></thead>
    <tbody></tbody>
</table>


<h3>Material</h3>
<table id="materialTable">
    <thead></thead>
    <tbody></tbody>
</table>
      




        </div>
      </div>
    </div>
